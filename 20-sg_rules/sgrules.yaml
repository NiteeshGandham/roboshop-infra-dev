bastion:
- name: bastion_internet
  port: 22
  src: internet
  dest: bastion
mongodb:
  - name: mongodb_catalogue #mongodb accepting connections from catalouge
    port: 27017
    src: catalouge
    dest: mongodb

  - name: mongodb_bastion #mongodb accepting connections from bastion
    port: 22
    src: bastion
    dest: mongodb

  - name: mongodb_user #mongodb accepting connections from user
    port: 27017
    src: user
    dest: mongodb

Redis:
  - name: redis_cart  #cart is dependent on redis
    port: 6379
    src: cart
    dest: Redis

Mysql:
  - name: Mysql_shipping  #shipping is dependent on mysql
    port: 3306
    src: shipping
    dest: mysql

rabbitmq:
  - name: rabbitmq_payment  #payment is dependent on rabbitmq
    port: 5672
    src: payment
    dest: rabbitmq